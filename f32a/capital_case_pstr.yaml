name: capital case
limit: 2000
memory_size: 0x1000
memory_mapped_io:
  0x80: [11, 0x50, 0x72, 0x69, 0x76, 0x65, 0x74, 0x21, 0x3c, 0x0a, 0x50, 0x72]
  0x84: []
reports:
  - name: Step-by-step
    slice: all
    view: |
      T A S {T:hex} {A:hex} {S:hex} R {R}
      {pc}: {instruction} {pc:label}
  - name: Result
    slice: last
    view: |
      numio[0x80]: {io:0x80:hex}
      numio[0x84]: {io:0x84:hex}
      symio[0x80]: {io:0x80:sym}
      symio[0x84]: {io:0x84:sym}
      {memory:0:31}